<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>猜数字游戏 v0.0.2</title>
<style>
  body{
    font-family:"Microsoft YaHei",sans-serif;
    text-align:center;
    background:#f5f7fa;
    margin-top:60px;
  }
  h1{color:#333;font-size:28px;}
  p{color:#666;}
  input{
    padding:10px;
    font-size:18px;
    width:140px;
    text-align:center;
    border:1px solid #ccc;
    border-radius:6px;
  }
  button{
    padding:10px 24px;
    font-size:18px;
    cursor:pointer;
    background:#4a90d9;
    color:#fff;
    border:none;
    border-radius:6px;
    margin-left:8px;
  }
  button:hover{background:#357abd;}
  #msg{margin-top:24px;font-size:20px;color:#444;min-height:30px;}
  .footer{margin-top:60px;font-size:12px;color:#999;}
</style>
</head>
<body>

<h1>🎮 猜数字游戏 v0.0.2</h1>
<p>我已随机一个 <b>1 ～ 100</b> 的数，你来猜！</p>

<input type="number" id="guess" placeholder="输入数字">
<button onclick="check()">猜！</button>

<div id="msg"></div>

<p class="footer">此程序由 1709174036@qq.com 提供</p>

<script>
const answer = Math.floor(Math.random()*100)+1;
let count = 0;

function check(){
  const g = Number(document.getElementById("guess").value);
  const msg = document.getElementById("msg");

  if(!g || g < 1 || g > 100){
    msg.innerText = "⚠️ 请输入 1～100 的数字！";
    return;
  }

  count++;

  if(g === answer){
    msg.innerText = "🎉 猜对啦！答案是 " + answer + "，你一共猜了 " + count + " 次～";
  } else if(g < answer){
    msg.innerText = "📉 太小了，再试试！";
  } else {
    msg.innerText = "📈 太大了，再试试！";
  }
}
</script>

</body>
</html>
