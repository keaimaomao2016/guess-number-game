<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
<meta charset="UTF-8">
<title>猜数字游戏 v0.0.6</title>
<style>
  :root {
    --bg: #f8f9fa;
    --text: #333;
    --sub: #666;
    --card: #ffffff;
    --btn: #4a90d9;
    --btn-hover: #357abd;
  }

  body {
    font-family: "Microsoft YaHei", sans-serif;
    text-align: center;
    background: var(--bg) url('') center/cover fixed;
    margin-top: 60px;
    color: var(--text);
    transition: background 0.4s, color 0.4s;
    min-height: 100vh;
  }

  h1 { font-size: 28px; margin-bottom: 10px; }
  .sub { color: var(--sub); margin-bottom: 20px; }

  .difficulty button {
    padding: 6px 14px;
    margin: 4px;
    border: 1px solid #bbb;
    border-radius: 6px;
    background: var(--card);
    cursor: pointer;
    font-size: 15px;
    transition: all 0.3s;
  }
  .difficulty button.active {
    background: var(--btn);
    color: #fff;
    border-color: var(--btn-hover);
  }

  input.guess-input {
    padding: 10px;
    font-size: 18px;
    width: 140px;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  button.guess-btn {
    padding: 10px 24px;
    font-size: 18px;
    cursor: pointer;
    background: var(--btn);
    color: #fff;
    border: none;
    border-radius: 6px;
    margin-left: 8px;
    transition: background 0.3s;
  }
  button.guess-btn:hover { background: var(--btn-hover); }

  #msg { margin-top: 24px; font-size: 20px; color: var(--text); min-height: 30px; }
  .footer { margin-top: 60px; font-size: 12px; color: var(--sub); }

  /* ====== 设置按钮 ====== */
  .settings-btn {
    margin-top: 30px;
    padding: 8px 20px;
    font-size: 15px;
    background: var(--card);
    border: 1px solid #ccc;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .settings-btn:hover { background: #eee; }

  /* ====== 设置面板 ====== */
  .settings-panel {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    justify-content: center;
    align-items: center;
  }
  .settings-panel.active { display: flex; }
  .settings-content {
    background: var(--card);
    border-radius: 12px;
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    max-width: 440px;
  }
  .settings-content h2 { margin-top: 0; color: var(--text); }

  .skin-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
  .skin-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .skin-item:hover { border-color: #4a90d9; background: #f0f8ff; }
  .skin-item.active { border-color: #4a90d9; background: #e6f0ff; }
  .skin-preview {
    width: 48px; height: 48px;
    border-radius: 10px;
    border: 1px solid #ccc;
    flex-shrink: 0;
  }
  .skin-name { font-size: 15px; font-weight: bold; }
  .skin-desc { font-size: 12px; color: #888; }

  /* 自定义输入区 */
  .custom-url {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px dashed #ccc;
    display: none;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .custom-url input {
    padding: 8px;
    font-size: 14px;
    width: 280px;
    border: 1px solid #ccc;
    border-radius: 6px;
    text-align: center;
  }
  .custom-url button {
    padding: 6px 18px;
    font-size: 14px;
    background: #4a90d9;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .custom-url button:hover { background: #357abd; }
  .custom-tip { font-size: 11px; color: #999; }

  .close-btn {
    margin-top: 20px;
    padding: 8px 24px;
    font-size: 14px;
    background: #4a90d9;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .close-btn:hover { background: #357abd; }

  /* ====== 皮肤样式 ====== */

  /* 1. 默认皮肤：一面空白 */
  body.skin-default {
    --bg: #ffffff;
    --text: #333;
    --sub: #666;
    --card: #f5f5f5;
    --btn: #4a90d9;
    --btn-hover: #357abd;
    background-image: none !important;
  }

  /* 2. 粉色猫爪主题 */
  body.skin-pink {
    --bg: #fff0f5;
    --text: #8b0045;
    --sub: #db7093;
    --card: #ffe4ec;
    --btn: #ff69b4;
    --btn-hover: #ff1493;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="25" cy="25" r="15" fill="%23ffb6c1" opacity="0.5"/><circle cx="65" cy="50" r="20" fill="%23ff69b4" opacity="0.4"/><circle cx="35" cy="80" r="14" fill="%23ffb6c1" opacity="0.6"/><circle cx="75" cy="20" r="12" fill="%23db7093" opacity="0.5"/><circle cx="50" cy="65" r="16" fill="%23ff69b4" opacity="0.35"/></svg>') !important;
    background-size: 160px;
  }

  /* 3. 蓝色猫爪主题 */
  body.skin-blue {
    --bg: #e6f2ff;
    --text: #003366;
    --sub: #4a90d9;
    --card: #d0e7ff;
    --btn: #4a90d9;
    --btn-hover: #0056b3;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="30" cy="30" r="16" fill="%234a90d9" opacity="0.45"/><circle cx="75" cy="55" r="22" fill="%230056b3" opacity="0.35"/><circle cx="45" cy="85" r="14" fill="%234a90d9" opacity="0.55"/><circle cx="80" cy="20" r="12" fill="%2367b7d1" opacity="0.5"/></svg>') !important;
    background-size: 180px;
  }

  /* 4. 自定义图片皮肤 */
  body.skin-custom {
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-attachment: fixed !important;
  }
</style>
</head>
<body class="skin-default" id="bodyEl">

<h1>🎮 猜数字游戏 v0.0.6</h1>
<div class="sub" id="rangeText">我已随机一个 10～100 的数，你来猜！</div>

<!-- 难度选择 -->
<div class="difficulty">
  <button onclick="setLevel(1)">难度1（1~10）</button>
  <button onclick="setLevel(2)">难度2（10~25）</button>
  <button onclick="setLevel(3)">难度3（25~45）</button>
  <button onclick="setLevel(4)">难度4（45~70）</button>
  <button onclick="setLevel(5)">难度5（70~100）</button>
  <button onclick="setCustom()" id="btnCustom">自定义</button>
</div>

<!-- 自定义输入区（最小值 & 最大值都可改） -->
<div class="custom-box" id="customBox" style="margin:10px 0; display:none;">
  <span>最小值：</span>
  <input type="number" id="customMin" placeholder="最小值" value="10" style="padding:8px;font-size:16px;width:90px;text-align:center;border:1px solid #ccc;border-radius:6px;margin:0 4px;">
  <span>最大值：</span>
  <input type="number" id="customMax" placeholder="最大值" value="100" style="padding:8px;font-size:16px;width:90px;text-align:center;border:1px solid #ccc;border-radius:6px;margin:0 4px;">
  <button onclick="applyCustom()" style="padding:8px 16px;font-size:16px;background:#4a90d9;color:#fff;border:none;border-radius:6px;cursor:pointer;">确定</button>
</div>

<!-- 输入区 -->
<input type="number" id="guess" placeholder="输入数字" class="guess-input">
<button class="guess-btn" onclick="check()">猜！</button>

<!-- 提示区 -->
<div id="msg"></div>

<!-- 页脚 -->
<p class="footer">此程序由 1709174036@qq.com 提供</p>

<!-- 设置按钮 -->
<button class="settings-btn" onclick="openSettings()">⚙️ 设置</button>

<!-- 设置面板 -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-content">
    <h2>⚙️ 选择皮肤</h2>
    <div class="skin-list">
      <!-- 默认皮肤 -->
      <div class="skin-item active" onclick="changeSkin('default',this)">
        <div class="skin-preview" style="background:#ffffff; border:1px solid #eee;"></div>
        <div>
          <div class="skin-name">默认皮肤</div>
          <div class="skin-desc">一面空白，干净清爽</div>
        </div>
      </div>
      <!-- 粉色猫爪 -->
      <div class="skin-item" onclick="changeSkin('pink',this)">
        <div class="skin-preview" style="background:linear-gradient(135deg,#ffb6c1,#ff69b4);"></div>
        <div>
          <div class="skin-name">🐾 粉色猫爪主题</div>
          <div class="skin-desc">粉嫩可爱，满屏猫爪印</div>
        </div>
      </div>
      <!-- 蓝色猫爪 -->
      <div class="skin-item" onclick="changeSkin('blue',this)">
        <div class="skin-preview" style="background:linear-gradient(135deg,#4a90d9,#0056b3);"></div>
        <div>
          <div class="skin-name">🐾 蓝色猫爪主题</div>
          <div class="skin-desc">清爽蓝色，软萌猫爪</div>
        </div>
      </div>
      <!-- 自定义图片 -->
      <div class="skin-item" onclick="changeSkin('custom',this)">
        <div class="skin-preview" style="background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:20px;">🖼️</div>
        <div>
          <div class="skin-name">🖼️ 自定义图片</div>
          <div class="skin-desc">输入图片网址，自定义背景</div>
        </div>
      </div>
      <!-- 自定义URL输入 -->
      <div class="custom-url" id="customUrlInput">
        <input type="text" id="bgUrl" placeholder="粘贴图片网址（以 .jpg/.png 结尾）">
        <button onclick="applyCustomBg()">应用</button>
        <div class="custom-tip">提示：右键网上图片 → 复制图片地址 → 粘贴到这里</div>
      </div>
    </div>
    <br>
    <button class="close-btn" onclick="closeSettings()">关闭</button>
  </div>
</div>

<script>
const levels = {
  1:{min:1,max:10},
  2:{min:10,max:25},
  3:{min:25,max:45},
  4:{min:45,max:70},
  5:{min:70,max:100}
};

let cur = 'custom';
let customMin = 10;
let customMax = 100;
let answer = 0;
let count = 0;

function setLevel(lv){
  cur = lv;
  document.getElementById('customBox').style.display = 'none';
  document.getElementById('customUrlInput').style.display = 'none';
  restartLevel(levels[lv]);
  highlight(lv);
  closeSettings();
}

function setCustom(){
  cur = 'custom';
  document.getElementById('customBox').style.display = 'block';
  document.getElementById('customUrlInput').style.display = 'none';
  highlight('custom');
}

function applyCustom(){
  const minVal = Number(document.getElementById('customMin').value);
  const maxVal = Number(document.getElementById('customMax').value);

  if(!minVal || !maxVal){
    alert('请输入最小值和最大值！');
    return;
  }
  if(minVal >= maxVal){
    alert('最小值必须小于最大值！');
    return;
  }

  customMin = minVal;
  customMax = maxVal;
  restartLevel({min: customMin, max: customMax});
  closeSettings();
}

function restartLevel(l){
  answer = Math.floor(Math.random()*(l.max-l.min+1))+l.min;
  count = 0;
  document.getElementById('rangeText').innerText =
    `我已随机一个 ${l.min}～${l.max} 的数，你来猜！`;
  document.getElementById('msg').innerText = '';
  document.getElementById('guess').value = '';
  document.getElementById('guess').min = l.min;
  document.getElementById('guess').max = l.max;
}

function highlight(active){
  document.querySelectorAll('.difficulty button').forEach((b,i)=>{
    b.classList.remove('active');
    if(active !== 'custom' && i === active-1) b.classList.add('active');
  });
  document.getElementById('btnCustom').classList.toggle('active', active==='custom');
}

function check(){
  const g = Number(document.getElementById('guess').value);
  let l = cur==='custom' ? {min:customMin,max:customMax} : levels[cur];
  const msg = document.getElementById('msg');
  if(!g || g<l.min || g>l.max){
    msg.innerText = `⚠️ 请输入 ${l.min}～${l.max} 的数字哦～`;
    return;
  }
  count++;
  if(g===answer){
    msg.innerText = `🎉 猜对啦！答案是 ${answer}，你一共猜了 ${count} 次～`;
  } else if(g<answer){
    msg.innerText = "📉 唔…有点小哦～";
  } else {
    msg.innerText = "📈 诶嘿…有点大哦～";
  }
}

// ====== 设置 + 换肤 ======
function openSettings(){
  document.getElementById('settingsPanel').classList.add('active');
}
function closeSettings(){
  document.getElementById('settingsPanel').classList.remove('active');
}

function changeSkin(skinName, el){
  document.querySelectorAll('.skin-item').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  document.body.className = '';
  document.body.classList.add('skin-' + skinName);
  document.getElementById('customUrlInput').style.display = skinName==='custom' ? 'flex' : 'none';
  if(skinName !== 'custom'){
    document.body.style.backgroundImage = '';
  }
  closeSettings();
}

function applyCustomBg(){
  const url = document.getElementById('bgUrl').value.trim();
  if(!url){
    alert('请先粘贴图片网址！');
    return;
  }
  document.body.classList.remove('skin-default','skin-pink','skin-blue');
  document.body.classList.add('skin-custom');
  document.body.style.backgroundImage = `url(${url})`;
  document.querySelectorAll('.skin-item').forEach(o=>o.classList.remove('active'));
  document.querySelector('.skin-item:nth-child(4)').classList.add('active');
  closeSettings();
}

// 默认初始化
restartLevel({min:customMin, max:customMax});
highlight('custom');
</script>

</body>
</html>
