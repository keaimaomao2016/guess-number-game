<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>猜数字游戏 v0.0.2</title>
<style>
  body{
    font-family:"Microsoft YaHei",sans-serif;
    text-align:center;
    background:#f5f7fa;
    margin-top:60px;
  }
  h1{color:#333;font-size:28px;}
  .sub{color:#666;margin-bottom:10px;}
  .difficulty button{
    padding:6px 14px;
    margin:4px;
    border:1px solid #bbb;
    border-radius:6px;
    background:#eef2f7;
    cursor:pointer;
    font-size:15px;
  }
  .difficulty button.active{
    background:#4a90d9;
    color:#fff;
    border-color:#357abd;
  }
  input{
    padding:10px;
    font-size:18px;
    width:140px;
    text-align:center;
    border:1px solid #ccc;
    border-radius:6px;
  }
  button.guess{
    padding:10px 24px;
    font-size:18px;
    cursor:pointer;
    background:#4a90d9;
    color:#fff;
    border:none;
    border-radius:6px;
    margin-left:8px;
  }
  button.guess:hover{background:#357abd;}
  #msg{margin-top:24px;font-size:20px;color:#444;min-height:30px;}
  .footer{margin-top:60px;font-size:12px;color:#999;}
</style>
</head>
<body>

<h1>🎮 猜数字游戏 v0.0.2</h1>
<div class="sub" id="rangeText">我已随机一个 1～100 的数，你来猜！</div>

<!-- 难度选择 -->
<div class="difficulty">
  <button onclick="setLevel(1)">难度1（1~10）</button>
  <button onclick="setLevel(2)">难度2（10~25）</button>
  <button onclick="setLevel(3)">难度3（25~45）</button>
  <button onclick="setLevel(4)">难度4（45~70）</button>
  <button onclick="setLevel(5)">难度5（70~100）</button>
</div>

<input type="number" id="guess" placeholder="输入数字">
<button class="guess" onclick="check()">猜！</button>

<div id="msg"></div>

<p class="footer">此程序由 1709174036@qq.com 提供</p>

<script>
const levels = {
  1:{min:1,max:10},
  2:{min:10,max:25},
  3:{min:25,max:45},
  4:{min:45,max:70},
  5:{min:70,max:100}
};

let cur = 5;
let answer = 0;
let count = 0;

function setLevel(lv){
  cur = lv;
  restart();
  document.querySelectorAll('.difficulty button').forEach(b=>{
    b.classList.toggle('active', Number(b.textContent.charAt(2))===lv);
  });
}

function restart(){
  const l = levels[cur];
  answer = Math.floor(Math.random()*(l.max-l.min+1))+l.min;
  count = 0;
  document.getElementById('rangeText').innerText =
    `我已随机一个 ${l.min}～${l.max} 的数，你来猜！`;
  document.getElementById('msg').innerText = '';
  document.getElementById('guess').value = '';
  document.getElementById('guess').min = l.min;
  document.getElementById('guess').max = l.max;
}

function check(){
  const g = Number(document.getElementById('guess').value);
  const l = levels[cur];
  const msg = document.getElementById('msg');

  if(!g || g<l.min || g>l.max){
    msg.innerText = `⚠️ 请输入 ${l.min}～${l.max} 的数字哦～`;
    return;
  }

  count++;
  if(g===answer){
    msg.innerText = `🎉 猜对啦！答案是 ${answer}，你一共猜了 ${count} 次～`;
  }else if(g<answer){
    msg.innerText = "📉 唔…有点小哦～";
  }else{
    msg.innerText = "📈 诶嘿…有点大哦～";
  }
}

// 初始默认难度5
restart();
setLevel(5);
</script>

</body>
</html>
